<html>
<head>
  <meta charset="UTF-8">
  <title>Wetter</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #000000dc;
      color: #84a9cf;
      font-size: 3em;
      font-family: system-ui;
      text-align: center;
    }
  </style>
</head>
<body>
<script>
  'use strict';
/**
 * Läd die Wetterdaten für die angegebenen Koordinaten.
 * Koordinaten werden berechnet via https://epsg.io/4326
 * OpenAPI-Doku für den Mode forecast: https://dataset.api.hub.geosphere.at/v1/openapi-docs#/forecast/Timeseries_Forecast_timeseries_forecast__resource_id__get
 * @param {string} Welche Wetter-Parameter das API liefern soll.
 */
async function getweather(parameter) {
  navigator.geolocation.getCurrentPosition(async pos => {
    const koordinaten = `${pos.coords.latitude},${pos.coords.longitude}`;
    const url = `https://dataset.api.hub.geosphere.at/v1/timeseries/forecast/nwp-v1-1h-2500m?parameters=${parameter}&lat_lon=${koordinaten}`;

    const res = await fetch(url);
    const json = await res.json();

    const stunde = new Date().getHours();
    const timezone = 2; // FIXME
    const temps = json.features[0].properties.parameters.t2m.data;

	  document.body.innerHTML += `Wetter in<br> ${koordinaten}<br>`;

    for (let i = timezone; i < 8; i++) {
      document.body.innerHTML += (stunde + i) + " → " + Math.round(temps[i]) + " °C<br>";
    }
  });
}

getweather("t2m");

</script>
</body>
</html>
