<html>
<head>
  <meta charset="UTF-8">
  <title>Wetter</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #1a1a1a;
      color: #fff;
      font-size: 24px;
      font-family: system-ui;
      text-align: center;
    }
  </style>
</head>
<body>
<script>
/**
 * Läd die Wetterdaten für die angegebenen Koordinaten.
 * Koordinaten werden berechnet via https://epsg.io/4326
 * OpenAPI-Doku für den Mode forecast: https://dataset.api.hub.geosphere.at/v1/openapi-docs#/forecast/Timeseries_Forecast_timeseries_forecast__resource_id__get
 */
async function getweather (parameter) {
  const koordinaten = "48.21,16.37" // Wien
  const url = `https://dataset.api.hub.geosphere.at/v1/timeseries/forecast/nwp-v1-1h-2500m?parameters=${parameter}&lat_lon=${koordinaten}`;
  try {
    const res = await fetch(url);
    const json = await res.json();

    const stunde = new Date().getHours();
    const times = json.timestamps;
    const temps = json.features[0].properties.parameters.t2m.data;

    for (let i = 0; i < 6; i++) {
      document.body.innerHTML += (stunde + i) +" → " + temps[i] + " °C<br>"; 
    }
  } catch (error) {
    console.error("Fehler beim Laden der Wetterdaten:", error);
    document.body.innerHTML = "Fehler beim Laden der Wetterdaten";
  }
}

getweather("t2m")
</script>
</body>
</html>
